services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api-storefront:
    build:
      context: ./apps/api-storefront
      dockerfile: Dockerfile
    container_name: ecommerce-api-storefront
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      NODE_ENV: production
    env_file:
      - apps/api-storefront/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-admin:
    build:
      context: ./apps/api-admin
      dockerfile: Dockerfile
    container_name: ecommerce-api-admin
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      NODE_ENV: production
    env_file:
      - apps/api-admin/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: ecommerce-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      NODE_ENV: production
    env_file:
      - apps/worker/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
    container_name: ecommerce-storefront
    restart: unless-stopped
    ports:
      - '8000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api-storefront:3000
    env_file:
      - apps/storefront/.env
    depends_on:
      - api-storefront

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: ecommerce-admin
    restart: unless-stopped
    ports:
      - '8001:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api-storefront:3000
    env_file:
      - apps/admin/.env
    depends_on:
      - api-storefront

volumes:
  postgres_data:
  redis_data:
